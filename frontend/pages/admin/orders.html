<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoHub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>
  <main class="container">
    <div class="page-header">
      <h1 class="page-title">Pedidos</h1>
      <p class="page-subtitle" id="total-text"></p>
    </div>
    <div class="filter-bar">
      <div class="filter-search">
        <span class="search-icon" data-ui-icon="search" data-ui-size="16"></span>
        <input type="text" id="search-input" placeholder="Buscar por ID ou cliente...">
      </div>
      <div class="filter-chips" id="status-filters"></div>
    </div>
    <div id="loading" class="empty-state"><div class="spinner spinner-dark"></div></div>
    <div id="table-card" class="card" style="overflow:hidden;display:none">
      <div class="table-wrapper">
        <table class="table" id="orders-table">
          <thead><tr><th>Pedido</th><th>Cliente</th><th>Itens</th><th>Total</th><th>Data</th><th>Status</th><th></th></tr></thead>
          <tbody id="orders-body"></tbody>
        </table>
      </div>
    </div>
    <div id="empty-state" class="card empty-state" style="display:none">
      <div class="empty-state-icon">-</div>
      <p class="empty-state-title">Nenhum pedido encontrado</p>
      <p class="empty-state-text">Tente ajustar os filtros ou a busca.</p>
    </div>
    <p id="count-text" class="text-sm text-muted mt-4"></p>
  </main>
  <script src="/js/services/api.js"></script>
  <script src="/js/icons.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin/orders.js"></script>
</body>
</html>
