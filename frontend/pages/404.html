<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoHub - Página não encontrada</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div style="text-align:center;max-width:480px">
      <p style="font-size:96px;font-weight:700;color:var(--color-primary);opacity:0.15;line-height:1;font-family:var(--font-mono)">404</p>
      <div style="width:64px;height:64px;border-radius:var(--radius-lg);background:var(--color-primary);display:flex;align-items:center;justify-content:center;margin:-48px auto 24px;box-shadow:0 8px 24px rgba(230,57,70,0.3)">
        <span style="color:#fff;font-weight:700;font-size:20px">AH</span>
      </div>
      <h1 style="font-size:28px;font-weight:700;margin-bottom:12px">Página não encontrada</h1>
      <p style="color:var(--color-text-muted);font-size:15px;margin-bottom:32px;line-height:1.6">A URL que você acessou não existe ou foi movida. Verifique o endereço ou volte para a página inicial.</p>
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-outline" onclick="history.back()">&#8592; Voltar</button>
        <a href="/" class="btn btn-primary">&#127968; Ir para o início</a>
      </div>
      <p class="auth-copyright">AutoHub © 2026 · Sistema de Gestão de Pedidos</p>
    </div>
  </div>
</body>
</html>
